spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/barracks_monitor}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  mqtt:
    broker-url: ${MQTT_BROKER:tcp://localhost:1883}

notification:
  wechat:
    webhook-url: ${WECHAT_WEBHOOK:}
  sms:
    api-key: ${SMS_API_KEY:}

algorithm:
  model-path: ${ML_MODEL_PATH:/var/models/}

logging:
  file:
    path: ${LOG_PATH:/var/log/barracks/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    prometheus:
      enabled: true
