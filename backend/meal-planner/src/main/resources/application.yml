server:
  port: 8084
  servlet:
    context-path: /api

spring:
  application:
    name: barracks-meal-planner

  datasource:
    url: jdbc:postgresql://localhost:5432/barracks_monitor
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
        jdbc:
          batch_size: 50

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

meal-planner:
  target-protein: 80
  target-fat: 50
  target-vitamin-c: 100
  calorie-min: 2500
  calorie-max: 3500
  training-boost: 0.2

scheduling:
  meal-planning:
    cron: "0 0 2 ? * MON"

logging:
  level:
    com.juyan.barracks: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    prometheus:
      enabled: true
