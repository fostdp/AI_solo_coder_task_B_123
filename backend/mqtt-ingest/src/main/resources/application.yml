server:
  port: 8081

spring:
  application:
    name: barracks-mqtt-ingest

  datasource:
    url: jdbc:postgresql://localhost:5432/barracks_monitor
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
        jdbc:
          batch_size: 50

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  mqtt:
    broker-url: tcp://localhost:1883
    client-id: barracks-mqtt-ingest
    username: admin
    password: public
    topic-nutrition: barracks/+/nutrition
    topic-fecal: barracks/+/fecal
    connection-timeout: 10
    keep-alive-interval: 20

logging:
  level:
    com.juyan.barracks: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    prometheus:
      enabled: true
