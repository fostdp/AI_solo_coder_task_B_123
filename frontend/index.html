<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代兵营士兵膳食营养监测与疫病预警系统</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="BarrackMap.js"></script>
    <script src="NutritionLegend.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e8e8e8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(90deg, rgba(139, 69, 19, 0.9), rgba(101, 67, 33, 0.9));
            padding: 16px 32px;
            border-bottom: 3px solid #d4a574;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 24px;
            color: #f5deb3;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .header .subtitle {
            font-size: 13px;
            color: #deb887;
            margin-top: 4px;
        }

        .container {
            display: grid;
            grid-template-columns: 320px 1fr 360px;
            gap: 16px;
            padding: 16px;
            height: calc(100vh - 80px);
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 8px;
            padding: 16px;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .panel-title {
            font-size: 16px;
            color: #d4a574;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(212, 165, 116, 0.3);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
            color: #f5deb3;
        }

        .stat-card .label {
            font-size: 11px;
            color: #a9a9a9;
            margin-top: 4px;
        }

        .barracks-item {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .barracks-item:hover, .barracks-item.active {
            background: rgba(212, 165, 116, 0.15);
            border-color: #d4a574;
        }

        .barracks-item .name {
            font-size: 14px;
            color: #f5deb3;
            font-weight: 500;
        }

        .barracks-item .meta {
            font-size: 11px;
            color: #a9a9a9;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
        }

        .risk-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
        }

        .risk-LOW { background: rgba(76, 175, 80, 0.3); color: #81c784; }
        .risk-MEDIUM { background: rgba(255, 193, 7, 0.3); color: #ffd54f; }
        .risk-HIGH { background: rgba(255, 87, 34, 0.3); color: #ff8a65; }
        .risk-CRITICAL { background: rgba(244, 67, 54, 0.4); color: #ef5350; }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        #barracksCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .canvas-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid rgba(212, 165, 116, 0.3);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .toolbar {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
        }

        .btn {
            background: rgba(139, 69, 19, 0.8);
            color: #f5deb3;
            border: 1px solid #d4a574;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(139, 69, 19, 1);
            transform: translateY(-1px);
        }

        .btn.primary {
            background: linear-gradient(135deg, #8b4513, #a0522d);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #f5deb3;
            border: 1px solid #d4a574;
        }

        .btn-warning {
            background: linear-gradient(135deg, #d97706, #b45309);
            color: #fff;
            border: 1px solid #f59e0b;
        }

        .btn-success {
            background: #22c55e;
            color: white;
            border: 1px solid #16a34a;
        }

        .btn-info {
            background: #3b82f6;
            color: white;
            border: 1px solid #2563eb;
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            padding: 0 16px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 2px solid rgba(212, 165, 116, 0.3);
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #a9a9a9;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 6px 6px 0 0;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #f5deb3;
        }

        .tab-btn.active {
            background: rgba(212, 165, 116, 0.15);
            color: #f5deb3;
            border-bottom: 2px solid #d4a574;
        }

        .tab-content {
            height: calc(100vh - 80px - 49px);
            overflow: hidden;
        }

        .tab-panel {
            display: none;
            height: 100%;
            overflow: hidden;
        }

        .tab-panel.active {
            display: block;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .soldier-popup {
            position: absolute;
            background: rgba(20, 20, 35, 0.98);
            border: 2px solid #d4a574;
            border-radius: 8px;
            padding: 16px;
            min-width: 300px;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
        }

        .soldier-popup .close-btn {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            color: #a9a9a9;
            font-size: 20px;
            cursor: pointer;
        }

        .soldier-popup h3 {
            color: #f5deb3;
            font-size: 16px;
            margin-bottom: 12px;
            padding-right: 24px;
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(212, 165, 116, 0.1);
            font-size: 13px;
        }

        .popup-row .label {
            color: #a9a9a9;
        }

        .popup-row .value {
            color: #f5deb3;
            font-weight: 500;
        }

        .popup-section {
            margin-top: 12px;
        }

        .popup-section-title {
            color: #d4a574;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(212, 165, 116, 0.3);
        }

        .nutrient-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }

        .nutrient-bar .name {
            width: 70px;
            font-size: 11px;
            color: #a9a9a9;
        }

        .nutrient-bar .bar-bg {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .nutrient-bar .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .nutrient-bar .val {
            width: 60px;
            text-align: right;
            font-size: 11px;
            color: #f5deb3;
        }

        .dietary-suggestion {
            background: rgba(212, 165, 116, 0.1);
            border-left: 3px solid #d4a574;
            padding: 10px 12px;
            font-size: 12px;
            line-height: 1.6;
            color: #d4c4a8;
            border-radius: 0 4px 4px 0;
            white-space: pre-line;
        }

        .alert-list-item {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-left: 3px solid #ef5350;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .alert-list-item.warning {
            background: rgba(255, 152, 0, 0.1);
            border-color: rgba(255, 152, 0, 0.3);
            border-left-color: #ffa726;
        }

        .alert-list-item .title {
            font-size: 13px;
            color: #ffab91;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .alert-list-item.warning .title {
            color: #ffcc80;
        }

        .alert-list-item .desc {
            font-size: 11px;
            color: #a9a9a9;
            line-height: 1.5;
        }

        .alert-list-item .time {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #a9a9a9;
            font-size: 14px;
        }

        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid rgba(212, 165, 116, 0.3);
            border-top-color: #d4a574;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: #888;
            padding: 20px;
            font-size: 12px;
        }

        .d3-tooltip {
            position: absolute;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #d4a574;
            border-radius: 4px;
            font-size: 12px;
            color: #f5deb3;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏯 古代兵营士兵膳食营养监测与疫病预警系统</h1>
        <div class="subtitle">汉代居延遗址复原 · 实时监测 · 智能预警</div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" data-tab="dashboard">实时监测</button>
        <button class="tab-btn" data-tab="advanced">高级分析</button>
    </div>

    <div class="tab-content">
        <div class="tab-panel active" id="dashboard-panel">
            <div class="container">
        <div class="panel">
            <div class="panel-title">📊 系统概览</div>
            <div id="statsContainer" class="stat-grid">
                <div class="stat-card"><div class="value">-</div><div class="label">兵营总数</div></div>
                <div class="stat-card"><div class="value">-</div><div class="label">士兵总数</div></div>
                <div class="stat-card"><div class="value" style="color:#ef5350;">-</div><div class="label">高风险</div></div>
                <div class="stat-card"><div class="value" style="color:#ffab91;">-</div><div class="label">活跃告警</div></div>
            </div>

            <div class="panel-title">🏛 兵营列表</div>
            <div id="barracksList"></div>

            <div class="panel-title">⚠️ 营养风险分布</div>
            <div id="riskDistribution" style="padding: 8px 0;"></div>
        </div>

        <div class="panel" style="padding: 0; overflow: hidden;">
            <div class="canvas-container">
                <canvas id="barracksCanvas"></canvas>
                <div id="nutritionLegend" class="canvas-overlay"></div>
                <div class="toolbar">
                    <button class="btn" onclick="refreshData()">🔄 刷新</button>
                    <button class="btn primary" onclick="runNutritionPrediction()">🧪 营养预测</button>
                    <button class="btn primary" onclick="runEpidemicScan()">🔬 疫情扫描</button>
                </div>
                <div id="soldierPopup" class="soldier-popup"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">🚨 疫情预警</div>
            <div id="epidemicAlerts"></div>

            <div class="panel-title">💉 高风险士兵</div>
            <div id="highRiskSoldiers"></div>
        </div>
            </div>
        </div>

        <div class="tab-panel" id="advanced-panel">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; height: 100%; overflow-y: auto;">
                
                <div class="card" style="padding: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="margin: 0;">🍜 膳食方案优化 (MIP)</h3>
                        <button class="btn btn-primary" id="generateMealPlanBtn" style="font-size: 12px; padding: 6px 12px;">生成本周食谱</button>
                    </div>
                    <div id="mealPlanSummary" style="font-size: 13px; margin-bottom: 12px;">
                        <p>加载中...</p>
                    </div>
                    <canvas id="mealPlanChart" height="180"></canvas>
                    <div id="mealPlanDetail" style="margin-top: 12px; max-height: 200px; overflow-y: auto; font-size: 12px;"></div>
                </div>

                <div class="card" style="padding: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="margin: 0;">🦠 疫情传播模型 (SEIR)</h3>
                        <button class="btn btn-warning" id="runSeirBtn" style="font-size: 12px; padding: 6px 12px;">运行模拟</button>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
                        <label style="font-size: 12px;">兵营:
                            <select id="seirBarracksId" style="width: 100%; padding: 4px; font-size: 12px;"></select>
                        </label>
                        <label style="font-size: 12px;">初始感染:
                            <input type="number" id="seirInitialInfected" value="2" min="1" max="50" style="width: 100%; padding: 4px; font-size: 12px;">
                        </label>
                    </div>
                    <div id="seirSummary" style="font-size: 13px; margin-bottom: 12px;">
                        <p>点击"运行模拟"查看疫情传播曲线</p>
                    </div>
                    <canvas id="seirChart" height="180"></canvas>
                    <div id="seirComparison" style="margin-top: 12px; font-size: 12px;"></div>
                </div>

                <div class="card" style="padding: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="margin: 0;">💊 营养干预推荐 (决策树)</h3>
                        <button class="btn btn-success" id="runInterventionBtn" style="font-size: 12px; padding: 6px 12px;">批量生成推荐</button>
                    </div>
                    <div id="interventionSummary" style="font-size: 13px; margin-bottom: 12px;">
                        <p>加载中...</p>
                    </div>
                    <canvas id="interventionChart" height="160"></canvas>
                    <div id="interventionList" style="margin-top: 12px; max-height: 200px; overflow-y: auto; font-size: 12px;"></div>
                </div>

                <div class="card" style="padding: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="margin: 0;">📦 补给漏洞分析 (Apriori)</h3>
                        <button class="btn btn-info" id="runAprioriBtn" style="font-size: 12px; padding: 6px 12px;">分析最近30天</button>
                    </div>
                    <div id="supplySummary" style="font-size: 13px; margin-bottom: 12px;">
                        <p>加载中...</p>
                    </div>
                    <canvas id="supplyChart" height="160"></canvas>
                    <div id="associationRules" style="margin-top: 12px; max-height: 200px; overflow-y: auto; font-size: 12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        const MEAL_PLANNER_API = 'http://localhost:8084/api';
        const SEIR_SIMULATOR_API = 'http://localhost:8085/api';
        const INTERVENTION_API = 'http://localhost:8086/api';
        const SUPPLY_API = 'http://localhost:8087/api';
        const RISK_COLORS = {
            LOW: '#81c784',
            MEDIUM: '#ffd54f',
            HIGH: '#ff8a65',
            CRITICAL: '#ef5350'
        };

        let allSoldiers = [];
        let allBarracks = [];
        let currentBarracksId = null;
        let dashboardSummary = null;
        let barrackMap = null;
        let nutritionLegend = null;

        async function fetchData(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (e) {
                console.error('请求失败:', url, e);
                return null;
            }
        }

        async function loadDashboardSummary() {
            const data = await fetchData(`${API_BASE}/v1/dashboard/summary`);
            if (data) {
                dashboardSummary = data;
                document.querySelector('#statsContainer').innerHTML = `
                    <div class="stat-card"><div class="value">${data.totalBarracks}</div><div class="label">兵营总数</div></div>
                    <div class="stat-card"><div class="value">${data.totalSoldiers}</div><div class="label">士兵总数</div></div>
                    <div class="stat-card"><div class="value" style="color:#ef5350;">${data.highRiskCount}</div><div class="label">高风险</div></div>
                    <div class="stat-card"><div class="value" style="color:#ffab91;">${data.activeEpidemicAlerts}</div><div class="label">活跃告警</div></div>
                `;

                const rs = data.nutritionRiskStats || {};
                document.getElementById('riskDistribution').innerHTML = `
                    <div style="display:flex;gap:4px;margin-bottom:8px;">
                        <div style="flex:${rs.LOW||1};height:24px;background:#81c784;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1a1a2e;font-weight:bold;">${rs.LOW||0}</div>
                        <div style="flex:${rs.MEDIUM||1};height:24px;background:#ffd54f;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1a1a2e;font-weight:bold;">${rs.MEDIUM||0}</div>
                        <div style="flex:${rs.HIGH||1};height:24px;background:#ff8a65;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1a1a2e;font-weight:bold;">${rs.HIGH||0}</div>
                        <div style="flex:${rs.CRITICAL||1};height:24px;background:#ef5350;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:bold;">${rs.CRITICAL||0}</div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:10px;color:#888;">
                        <span>低风险</span><span>中</span><span>高</span><span>严重</span>
                    </div>
                `;
            }
        }

        async function loadBarracks() {
            const data = await fetchData(`${API_BASE}/v1/barracks`);
            if (data) {
                allBarracks = data;
                const listEl = document.getElementById('barracksList');
                listEl.innerHTML = data.map((b, idx) => `
                    <div class="barracks-item ${idx === 0 ? 'active' : ''}" data-id="${b.id}" onclick="selectBarracks(${b.id}, this)">
                        <div class="name">${b.name}</div>
                        <div class="meta">
                            <span>编号: ${b.code}</span>
                            <span>容量: ${b.capacity}人</span>
                        </div>
                    </div>
                `).join('');
                if (data.length > 0) {
                    currentBarracksId = data[0].id;
                    loadSoldiers(currentBarracksId);
                }
            }
        }

        async function loadSoldiers(barracksId) {
            const data = await fetchData(`${API_BASE}/v1/barracks/${barracksId}/soldiers/with-risk`);
            if (data) {
                allSoldiers = data;
                renderCanvas();
                renderHighRiskSoldiers(data.filter(s => s.riskLevel === 'HIGH' || s.riskLevel === 'CRITICAL'));
            }
        }

        async function loadEpidemicAlerts() {
            const data = await fetchData(`${API_BASE}/v1/epidemic-alerts?status=ACTIVE`);
            const el = document.getElementById('epidemicAlerts');
            if (!data || data.length === 0) {
                el.innerHTML = '<div class="empty-state">✅ 当前无活跃疫情预警</div>';
                return;
            }
            const barracksMap = {};
            allBarracks.forEach(b => barracksMap[b.id] = b);
            el.innerHTML = data.map(a => {
                const barracks = barracksMap[a.barracksId] || { name: '未知兵营' };
                const isCritical = a.alertLevel === 'CRITICAL';
                const rate = (a.positiveRate * 100).toFixed(1);
                return `
                    <div class="alert-list-item ${isCritical ? '' : 'warning'}">
                        <div class="title">
                            <span class="risk-badge risk-${a.alertLevel}">${a.alertLevel === 'CRITICAL' ? '严重' : a.alertLevel === 'HIGH' ? '高危' : '中等'}</span>
                            ${barracks.name}
                        </div>
                        <div class="desc">
                            阳性率: ${rate}% (${a.affectedCount}/${a.totalCount})<br>
                            ${a.description ? a.description.substring(0, 80) + '...' : ''}
                        </div>
                        <div class="time">${new Date(a.createdAt).toLocaleString('zh-CN')}</div>
                    </div>
                `;
            }).join('');
        }

        function renderHighRiskSoldiers(soldiers) {
            const el = document.getElementById('highRiskSoldiers');
            if (!soldiers || soldiers.length === 0) {
                el.innerHTML = '<div class="empty-state">✅ 当前无高风险士兵</div>';
                return;
            }
            soldiers.sort((a, b) => (b.overallRiskScore || 0) - (a.overallRiskScore || 0));
            el.innerHTML = soldiers.slice(0, 10).map(s => `
                <div class="alert-list-item ${s.riskLevel === 'CRITICAL' ? '' : 'warning'}" style="cursor:pointer;" onclick="showSoldierDetail(${JSON.stringify(s).replace(/"/g, '&quot;')})">
                    <div class="title">
                        <span class="risk-badge risk-${s.riskLevel}">${s.riskLevel === 'CRITICAL' ? '严重' : '高危'}</span>
                        ${s.name} (${s.soldierCode})
                    </div>
                    <div class="desc">
                        维C风险: ${((s.vitaminCRiskScore || 0) * 100).toFixed(0)}% | 
                        蛋白: ${(s.dailyProteinG || 0).toFixed(0)}g | 
                        维C: ${(s.dailyVitaminCMg || 0).toFixed(0)}mg
                    </div>
                </div>
            `).join('');
        }

        function selectBarracks(id, el) {
            document.querySelectorAll('.barracks-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            currentBarracksId = id;
            loadSoldiers(id);
        }

        function renderCanvas() {
            const canvas = document.getElementById('barracksCanvas');
            const barracks = allBarracks.find(b => b.id === currentBarracksId);
            if (!barracks) return;

            if (barrackMap) {
                barrackMap.stop();
            }

            barrackMap = new BarrackMap(canvas, {
                padding: 60,
                nodeRadius: 6,
                collisionPadding: 3,
                chargeStrength: -15,
                alphaDecay: 0.04,
                alphaMin: 0.005,
                velocityDecay: 0.4,
                onSoldierClick: (soldier) => {
                    if (soldier) {
                        showSoldierDetail(soldier);
                    } else {
                        hideSoldierDetail();
                    }
                }
            });
            barrackMap.setData(allSoldiers, barracks);

            if (!nutritionLegend) {
                const legendContainer = document.getElementById('nutritionLegend');
                if (legendContainer) {
                    nutritionLegend = new NutritionLegend(legendContainer, {
                        layout: 'horizontal',
                        showCounts: true,
                        interactive: false
                    });
                }
            }
            if (nutritionLegend) {
                nutritionLegend.setData(barrackMap.getStats());
            }

            renderHighRiskSoldiers(allSoldiers.filter(s => s.riskLevel === 'HIGH' || s.riskLevel === 'CRITICAL'));
        }

        function showSoldierDetail(soldier) {
            const popup = document.getElementById('soldierPopup');
            const proteinPct = Math.min(100, ((soldier.dailyProteinG || 0) / 70) * 100);
            const fatPct = Math.min(100, ((soldier.dailyFatG || 0) / 60) * 100);
            const vitaminCPct = Math.min(100, ((soldier.dailyVitaminCMg || 0) / 80) * 100);
            const caloriePct = Math.min(100, ((soldier.dailyCalorieKcal || 0) / 3500) * 100);

            popup.innerHTML = `
                <button class="close-btn" onclick="hideSoldierDetail()">×</button>
                <h3>${soldier.name} <span class="risk-badge risk-${soldier.riskLevel}" style="margin-left:8px;">${soldier.riskLevel === 'CRITICAL' ? '严重风险' : soldier.riskLevel === 'HIGH' ? '高风险' : soldier.riskLevel === 'MEDIUM' ? '中风险' : '低风险'}</span></h3>
                <div class="popup-row"><span class="label">士兵编号</span><span class="value">${soldier.soldierCode}</span></div>
                <div class="popup-row"><span class="label">年龄</span><span class="value">${soldier.age}岁</span></div>
                <div class="popup-row"><span class="label">军衔</span><span class="value">${soldier.rank || '士卒'}</span></div>
                <div class="popup-row"><span class="label">综合风险评分</span><span class="value" style="color:${RISK_COLORS[soldier.riskLevel]}">${((soldier.overallRiskScore || 0) * 100).toFixed(1)}%</span></div>

                <div class="popup-section">
                    <div class="popup-section-title">📋 今日营养摄入</div>
                    <div class="nutrient-bar">
                        <span class="name">蛋白质</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${proteinPct}%;background:${proteinPct < 70 ? '#ef5350' : '#81c784'}"></div></div>
                        <span class="val">${(soldier.dailyProteinG || 0).toFixed(1)}g</span>
                    </div>
                    <div class="nutrient-bar">
                        <span class="name">脂肪</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${fatPct}%;background:${fatPct < 60 ? '#ffab91' : '#81c784'}"></div></div>
                        <span class="val">${(soldier.dailyFatG || 0).toFixed(1)}g</span>
                    </div>
                    <div class="nutrient-bar">
                        <span class="name">维生素C</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${vitaminCPct}%;background:${vitaminCPct < 75 ? '#ef5350' : '#81c784'}"></div></div>
                        <span class="val">${(soldier.dailyVitaminCMg || 0).toFixed(1)}mg</span>
                    </div>
                    <div class="nutrient-bar">
                        <span class="name">热量</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${caloriePct}%;background:${caloriePct < 70 ? '#ffab91' : '#81c784'}"></div></div>
                        <span class="val">${(soldier.dailyCalorieKcal || 0).toFixed(0)}kcal</span>
                    </div>
                </div>

                <div class="popup-section">
                    <div class="popup-section-title">📊 分项风险评分</div>
                    <div class="nutrient-bar">
                        <span class="name">蛋白风险</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${(soldier.proteinRiskScore||0)*100}%;background:#ffab91"></div></div>
                        <span class="val">${((soldier.proteinRiskScore||0)*100).toFixed(0)}%</span>
                    </div>
                    <div class="nutrient-bar">
                        <span class="name">脂肪风险</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${(soldier.fatRiskScore||0)*100}%;background:#ffab91"></div></div>
                        <span class="val">${((soldier.fatRiskScore||0)*100).toFixed(0)}%</span>
                    </div>
                    <div class="nutrient-bar">
                        <span class="name">维C风险</span>
                        <div class="bar-bg"><div class="bar-fill" style="width:${(soldier.vitaminCRiskScore||0)*100}%;background:#ef5350"></div></div>
                        <span class="val">${((soldier.vitaminCRiskScore||0)*100).toFixed(0)}%</span>
                    </div>
                </div>

                <div class="popup-section">
                    <div class="popup-section-title">🥗 膳食改进建议</div>
                    <div class="dietary-suggestion">${soldier.dietarySuggestion || '当前膳食结构基本合理。'}</div>
                </div>
            `;

            popup.style.display = 'block';
            const canvas = document.getElementById('barracksCanvas');
            popup.style.left = Math.min(canvas.width - 400, 40) + 'px';
            popup.style.top = '40px';
        }

        function hideSoldierDetail() {
            document.getElementById('soldierPopup').style.display = 'none';
        }

        async function runNutritionPrediction() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ 运行中...';
            await fetch(`${API_BASE}/v1/nutrition-prediction/run`, { method: 'POST' });
            alert('✅ 营养预测任务已完成！');
            btn.disabled = false;
            btn.textContent = '🧪 营养预测';
            refreshData();
        }

        async function runEpidemicScan() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ 扫描中...';
            await fetch(`${API_BASE}/v1/epidemic-scan/run`, { method: 'POST' });
            alert('✅ 疫情扫描任务已完成！');
            btn.disabled = false;
            btn.textContent = '🔬 疫情扫描';
            refreshData();
        }

        async function refreshData() {
            await loadDashboardSummary();
            await loadEpidemicAlerts();
            if (currentBarracksId) {
                await loadSoldiers(currentBarracksId);
            }
            initAdvancedModules();
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tab + '-panel').classList.add('active');
                if (tab === 'dashboard' && allSoldiers.length > 0) {
                    setTimeout(renderCanvas, 50);
                }
            });
        });

        window.addEventListener('resize', () => {
            if (allSoldiers.length > 0) renderCanvas();
        });

        (async function init() {
            await loadDashboardSummary();
            await loadBarracks();
            await loadEpidemicAlerts();
            initAdvancedModules();
            setInterval(refreshData, 60000);
        })();

        let mealPlanChart = null, seirChart = null, interventionChart = null, supplyChart = null;

        function initAdvancedModules() {
            loadMealPlans();
            loadInterventionRecommendations();
            loadSupplyAnalysis();
            loadSeirBarracksOptions();
        }

        async function loadMealPlans() {
            try {
                const res = await fetch(`${MEAL_PLANNER_API}/v1/meal-plans?pageSize=1`);
                const data = await res.json();
                const summary = document.getElementById('mealPlanSummary');
                if (data && data.length > 0) {
                    const plan = data[0];
                    summary.innerHTML = `
                        <div><strong>计划名称:</strong> ${plan.planName || '本周食谱'}</div>
                        <div><strong>周期:</strong> ${plan.startDate || '-'} ~ ${plan.endDate || '-'}</div>
                        <div><strong>目标人数:</strong> ${plan.targetSoldierCount || 0}人</div>
                        <div><strong>总成本:</strong> ¥${(plan.totalCost || 0).toFixed(2)}</div>
                        <div><strong>求解状态:</strong> ${plan.solverStatus || '-'}</div>
                    `;
                    renderMealPlanChart(plan);
                    renderMealPlanDetail(plan);
                } else {
                    summary.innerHTML = '<p>暂无食谱计划，点击右上角按钮生成</p>';
                }
            } catch (e) {
                document.getElementById('mealPlanSummary').innerHTML = '<p style="color: #ef4444;">膳食服务连接失败 (8084未启动)</p>';
            }
        }

        function renderMealPlanChart(plan) {
            const ctx = document.getElementById('mealPlanChart').getContext('2d');
            if (mealPlanChart) mealPlanChart.destroy();
            mealPlanChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['蛋白质(g)', '脂肪(g)', '维C(mg)', '热量(kcal)'],
                    datasets: [
                        {
                            label: '实际达成',
                            data: [
                                plan.dailyProteinG || 0,
                                plan.dailyFatG || 0,
                                plan.dailyVitaminCMg || 0,
                                plan.dailyCalorieKcal || 0
                            ],
                            backgroundColor: 'rgba(59, 130, 246, 0.7)'
                        },
                        {
                            label: '目标下限',
                            data: [80, 50, 100, 2500],
                            backgroundColor: 'rgba(34, 197, 94, 0.5)'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function renderMealPlanDetail(plan) {
            const el = document.getElementById('mealPlanDetail');
            if (plan.items && plan.items.length > 0) {
                const grouped = {};
                plan.items.forEach(it => {
                    const key = `第${it.dayOfWeek}天-${it.mealType}`;
                    if (!grouped[key]) grouped[key] = [];
                    grouped[key].push(`${it.foodName} ${it.quantityGrams || 0}g`);
                });
                el.innerHTML = Object.entries(grouped).map(([k, v]) =>
                    `<div style="margin: 4px 0;"><strong>${k}:</strong> ${v.join('、')}</div>`
                ).join('');
            }
        }

        document.addEventListener('click', async function(e) {
            if (e.target.id === 'generateMealPlanBtn') {
                e.target.disabled = true;
                e.target.textContent = '生成中...';
                try {
                    const barracksRes = await fetch(`${API_BASE}/v1/barracks`);
                    const barracks = await barracksRes.json();
                    const barracksId = barracks.length > 0 ? barracks[0].id : 1;
                    await fetch(`${MEAL_PLANNER_API}/v1/meal-plans/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ barracksId, startDate: new Date().toISOString().slice(0,10), soldierCount: 40 })
                    });
                    setTimeout(loadMealPlans, 500);
                } finally {
                    e.target.disabled = false;
                    e.target.textContent = '生成本周食谱';
                }
            }
            
            if (e.target.id === 'runSeirBtn') {
                e.target.disabled = true;
                e.target.textContent = '模拟中...';
                try {
                    const barracksId = document.getElementById('seirBarracksId').value;
                    const initInfected = parseInt(document.getElementById('seirInitialInfected').value) || 2;
                    const res = await fetch(`${SEIR_SIMULATOR_API}/v1/seir-simulations/run`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ barracksId: parseInt(barracksId), initialInfected: initInfected, simulationDays: 60, quarantineStartDay: 10, isolationEffectiveness: 0.6 })
                    });
                    const sim = await res.json();
                    await renderSeirResult(sim);
                } finally {
                    e.target.disabled = false;
                    e.target.textContent = '运行模拟';
                }
            }
            
            if (e.target.id === 'runInterventionBtn') {
                e.target.disabled = true;
                e.target.textContent = '生成中...';
                try {
                    await fetch(`${INTERVENTION_API}/v1/intervention-recommendations/generate-all`, { method: 'POST' });
                    setTimeout(loadInterventionRecommendations, 500);
                } finally {
                    e.target.disabled = false;
                    e.target.textContent = '批量生成推荐';
                }
            }
            
            if (e.target.id === 'runAprioriBtn') {
                e.target.disabled = true;
                e.target.textContent = '分析中...';
                try {
                    await fetch(`${SUPPLY_API}/v1/supply-analysis/run`, { method: 'POST' });
                    setTimeout(loadSupplyAnalysis, 500);
                } finally {
                    e.target.disabled = false;
                    e.target.textContent = '分析最近30天';
                }
            }
        });

        async function loadSeirBarracksOptions() {
            try {
                const res = await fetch(`${API_BASE}/v1/barracks`);
                const data = await res.json();
                const select = document.getElementById('seirBarracksId');
                if (select) {
                    select.innerHTML = data.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
                }
            } catch (e) {}
        }

        async function renderSeirResult(sim) {
            const summary = document.getElementById('seirSummary');
            const labels = [];
            const sData = [], eData = [], iData = [], rData = [], qData = [];
            
            if (sim && sim.timePoints) {
                sim.timePoints.forEach(tp => {
                    labels.push('D' + tp.day);
                    sData.push(tp.susceptibleCount || 0);
                    eData.push(tp.exposedCount || 0);
                    iData.push(tp.infectedCount || 0);
                    rData.push(tp.recoveredCount || 0);
                    qData.push(tp.quarantinedCount || 0);
                });
                summary.innerHTML = `
                    <div><strong>R₀基本再生数:</strong> ${(sim.transmissionRateBeta / sim.recoveryRateGamma).toFixed(2)}</div>
                    <div><strong>峰值日:</strong> 第${sim.peakDay || '-'}天</div>
                    <div><strong>峰值感染:</strong> ${sim.maxInfectedCount || 0}人</div>
                    <div><strong>总感染人数:</strong> ${sim.totalInfectedCount || 0}人</div>
                `;
            }
            
            const ctx = document.getElementById('seirChart').getContext('2d');
            if (seirChart) seirChart.destroy();
            seirChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: '易感(S)', data: sData, borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.1)', fill: true, tension: 0.3 },
                        { label: '潜伏(E)', data: eData, borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.1)', fill: true, tension: 0.3 },
                        { label: '感染(I)', data: iData, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.3 },
                        { label: '恢复(R)', data: rData, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.1)', fill: true, tension: 0.3 },
                        { label: '隔离(Q)', data: qData, borderColor: '#a855f7', backgroundColor: 'rgba(168,85,247,0.1)', fill: true, tension: 0.3, borderDash: [5,5] }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10 } } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        async function loadInterventionRecommendations() {
            try {
                const res = await fetch(`${INTERVENTION_API}/v1/intervention-recommendations?pageSize=50`);
                const data = await res.json();
                const summary = document.getElementById('interventionSummary');
                const recs = Array.isArray(data) ? data : (data.content || data.items || []);
                
                const pending = recs.filter(r => r.status === 'PENDING' || !r.status).length;
                const totalCost = recs.reduce((s, r) => s + (r.estimatedCostTotal || 0), 0);
                
                const riskCounts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
                recs.forEach(r => { if (r.riskLevel) riskCounts[r.riskLevel] = (riskCounts[r.riskLevel] || 0) + 1; });
                
                summary.innerHTML = `
                    <div><strong>推荐总数:</strong> ${recs.length}条</div>
                    <div><strong>待执行:</strong> ${pending}条</div>
                    <div><strong>预计总费用:</strong> ¥${totalCost.toFixed(2)}</div>
                `;
                
                const ctx = document.getElementById('interventionChart').getContext('2d');
                if (interventionChart) interventionChart.destroy();
                interventionChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(riskCounts),
                        datasets: [{
                            data: Object.values(riskCounts),
                            backgroundColor: ['#dc2626', '#ea580c', '#ca8a04', '#16a34a']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'right', labels: { font: { size: 10 }, boxWidth: 10 } } }
                    }
                });
                
                const list = document.getElementById('interventionList');
                const highRisk = recs.filter(r => ['CRITICAL', 'HIGH'].includes(r.riskLevel)).slice(0, 10);
                list.innerHTML = highRisk.map(r => `
                    <div style="padding: 6px; border-bottom: 1px solid #e5e7eb;">
                        <div><strong>${r.soldierName || '士兵#'+r.soldierId}</strong>
                            <span style="float:right; padding: 1px 6px; border-radius: 3px; font-size: 11px;
                                background: ${r.riskLevel==='CRITICAL'?'#fee2e2':r.riskLevel==='HIGH'?'#ffedd5':'#fef9c3'};
                                color: ${r.riskLevel==='CRITICAL'?'#dc2626':r.riskLevel==='HIGH'?'#ea580c':'#854d0e'};">
                                ${r.riskLevel || '-'}
                            </span>
                        </div>
                        <div style="color: #6b7280;">💊 ${r.recommendedSupplements || '-'}</div>
                        <div style="color: #6b7280;">💰 ¥${(r.estimatedCostTotal||0).toFixed(2)} / ${r.durationDays||14}天</div>
                    </div>
                `).join('');
                
            } catch (e) {
                document.getElementById('interventionSummary').innerHTML = '<p style="color: #ef4444;">干预服务连接失败 (8086未启动)</p>';
            }
        }

        async function loadSupplyAnalysis() {
            try {
                const [rulesRes, topRes] = await Promise.all([
                    fetch(`${SUPPLY_API}/v1/association-rules/significant`),
                    fetch(`${SUPPLY_API}/v1/supply-analysis/top-deficits`)
                ]);
                const rules = await rulesRes.json();
                const topDeficits = await topRes.json();
                
                const summary = document.getElementById('supplySummary');
                const sigRules = Array.isArray(rules) ? rules.filter(r => r.isSignificant !== false) : [];
                summary.innerHTML = `
                    <div><strong>显著关联规则:</strong> ${sigRules.length}条</div>
                    <div><strong>分析周期:</strong> 最近30天</div>
                    <div><strong>最小Lift阈值:</strong> 1.5</div>
                `;
                
                const ctx = document.getElementById('supplyChart').getContext('2d');
                if (supplyChart) supplyChart.destroy();
                const labels = (topDeficits || []).slice(0, 5).map(d => d.foodCategory || d.foodName || '');
                const data = (topDeficits || []).slice(0, 5).map(d => (d.avgDeficitRate || d.deficitRate || 0) * 100);
                supplyChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: '平均短缺率 (%)',
                            data,
                            backgroundColor: ['#fee2e2', '#fecaca', '#fed7aa', '#fde68a', '#fef08a'].reverse()
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { beginAtZero: true, max: 100, ticks: { callback: v => v+'%' } } }
                    }
                });
                
                const rulesEl = document.getElementById('associationRules');
                rulesEl.innerHTML = (sigRules.slice(0, 8)).map((r, i) => `
                    <div style="padding: 6px; border-bottom: 1px solid #e5e7eb; background: ${i<3?'#fffbeb':'transparent'};">
                        <div style="font-weight: 500;">${r.ruleDescription || r.antecedentItems + ' → ' + r.consequentItems}</div>
                        <div style="color: #6b7280; font-size: 11px;">
                            Support: ${((r.support||0)*100).toFixed(1)}% | 
                            Confidence: ${((r.confidence||0)*100).toFixed(1)}% | 
                            Lift: <strong style="color:#dc2626;">${(r.lift||0).toFixed(2)}</strong>
                        </div>
                    </div>
                `).join('');
                
            } catch (e) {
                document.getElementById('supplySummary').innerHTML = '<p style="color: #ef4444;">补给服务连接失败 (8087未启动)</p>';
            }
        }
    </script>
</body>
</html>
